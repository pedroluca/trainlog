name: Build and Publish Dist

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional --force

      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_UPLOAD_URL: ${{ secrets.VITE_API_UPLOAD_URL }}

      # 🔥 Aqui começa a mágica
      - name: Publish dist to deploy branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo
          cd repo

          # 🔥 garante que a branch existe localmente baseada na remota
          git fetch origin

          git checkout -B deploy origin/deploy || git checkout -b deploy

          # 🔥 sincroniza arquivos
          rsync -av --delete ../dist/ .

          git add .

          # 🔥 SEMPRE cria commit (ESSENCIAL)
          git commit -m "Deploy build $(date +'%Y-%m-%d %H:%M:%S')" --allow-empty

          git push origin deploy
